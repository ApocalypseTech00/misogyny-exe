<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-weight: 900; }
  .container { width: 100vmin; height: 100vmin; position: relative; display: flex; align-items: center; justify-content: center; flex-direction: column; overflow: hidden; }
  .container::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent, transparent 1px, rgba(0,0,0,0.12) 1px, rgba(0,0,0,0.12) 2px); pointer-events: none; z-index: 10; }
  .quote-line { text-align: center; text-transform: uppercase; color: #F918D0; letter-spacing: 0.05em; min-height: 1.2em; padding: 0 5vmin; position: relative; }
  .ch {
    display: inline-block;
    position: relative;
    transition: transform 0.04s linear, opacity 0.05s linear;
  }
  /* VHS-style rgb-split ghosts rendered via ::before / ::after; only visible when .glitching */
  .ch::before, .ch::after {
    content: attr(data-ch);
    position: absolute; left: 0; top: 0;
    width: 100%; text-align: center;
    opacity: 0;
    pointer-events: none;
    mix-blend-mode: screen;
    transition: opacity 0.05s linear, transform 0.04s linear;
  }
  .ch::before { color: #ffffff; transform: translateX(-2px); }
  .ch::after  { color: rgba(255, 0, 100, 0.9); transform: translateX(2px); }
  .ch.glitching::before { opacity: 0.85; transform: translateX(-4px); }
  .ch.glitching::after  { opacity: 0.8;  transform: translateX(4px); }
  .ch.glitching { animation: chShake 0.06s steps(2) 3; }
  @keyframes chShake {
    0% { transform: translate(0,0); }
    50% { transform: translate(1px, -1px); }
    100% { transform: translate(-1px, 1px); }
  }
  .scanline {
    position: absolute; left: 0; right: 0;
    height: 3vmin;
    background: linear-gradient(to bottom,
      rgba(249, 24, 208, 0) 0%,
      rgba(249, 24, 208, 0.15) 40%,
      rgba(249, 24, 208, 0.9) 50%,
      rgba(249, 24, 208, 0.15) 60%,
      rgba(249, 24, 208, 0) 100%);
    box-shadow: 0 0 20px #F918D0, 0 0 40px #F918D080;
    top: -10vmin;
    z-index: 8;
    mix-blend-mode: screen;
    animation: scanSweep 3.4s linear infinite;
  }
  @keyframes scanSweep {
    0%   { top: -10vmin; }
    100% { top: 105vmin; }
  }
</style></head><body>
<div class="container">
  <div id="quote"></div>
  <div class="scanline"></div>
</div>
<script>
const QUOTES = ["Women have ruined the country and should not be allowed to vote."];
const LINES_CONFIG = { 4:{wpl:1,size:12}, 10:{wpl:3,size:6}, 15:{wpl:3,size:5}, 25:{wpl:3,size:4} };
function getConfig(wc) { if (wc<=4) return LINES_CONFIG[4]; if (wc<=10) return LINES_CONFIG[10]; if (wc<=18) return LINES_CONFIG[15]; return LINES_CONFIG[25]; }
function breakIntoLines(text, wpl) {
  const words = text.split(/\s+/);
  const totalLines = Math.ceil(words.length / wpl);
  const base = Math.floor(words.length / totalLines);
  const extra = words.length % totalLines;
  const lines = []; let idx = 0;
  for (let i = 0; i < totalLines; i++) { const take = base + (i < extra ? 1 : 0); lines.push(words.slice(idx, idx + take).join(' ')); idx += take; }
  return lines;
}

const quoteEl = document.getElementById('quote');
const quote = QUOTES[0];
const wc = quote.split(/\s+/).length;
const config = getConfig(wc);
const lines = breakIntoLines(quote, config.wpl);

const chars = [];
lines.forEach(line => {
  const lineEl = document.createElement('div');
  lineEl.className = 'quote-line';
  lineEl.style.fontSize = config.size + 'vmin';
  lineEl.style.lineHeight = '1.3';
  for (const c of line) {
    const span = document.createElement('span');
    span.className = 'ch';
    span.textContent = c === ' ' ? '\u00A0' : c;
    span.setAttribute('data-ch', c === ' ' ? '\u00A0' : c);
    lineEl.appendChild(span);
    if (c !== ' ') chars.push({ el: span });
  }
  quoteEl.appendChild(lineEl);
});

// Watch the scanline's y position. When it's near a character, trigger VHS glitch.
const scanlineEl = document.querySelector('.scanline');
function tick() {
  const sr = scanlineEl.getBoundingClientRect();
  const scanY = sr.top + sr.height / 2;
  chars.forEach(c => {
    const r = c.el.getBoundingClientRect();
    const cy = r.top + r.height / 2;
    const dist = Math.abs(cy - scanY);
    if (dist < 48) {
      c.el.classList.add('glitching');
    } else {
      c.el.classList.remove('glitching');
    }
  });
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script></body></html>
