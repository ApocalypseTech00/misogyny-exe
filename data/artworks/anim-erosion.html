<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-weight: 900; }
  .container { width: 100vmin; height: 100vmin; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .container::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent, transparent 1px, rgba(0,0,0,0.12) 1px, rgba(0,0,0,0.12) 2px); pointer-events: none; z-index: 10; }
  .quote { position: relative; text-align: center; text-transform: uppercase; letter-spacing: 0.05em; color: #F918D0; padding: 0 5vmin; filter: url(#erode) drop-shadow(0 0 10px #F918D099); }
  .speck { position: absolute; inset: 0; pointer-events: none; mix-blend-mode: screen; opacity: 0.35; z-index: 3; }
</style></head><body>
<div class="container">
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <filter id="erode" x="-15%" y="-15%" width="130%" height="130%">
        <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" seed="1" result="noise">
          <animate attributeName="seed"
            values="0;4;9;14;19;24;30;36;42;48;54;60;66;72;0"
            keyTimes="0;0.06;0.12;0.18;0.24;0.30;0.40;0.50;0.60;0.70;0.78;0.86;0.92;0.97;1"
            dur="9s" repeatCount="indefinite"/>
          <animate attributeName="baseFrequency"
            values="0.95;0.88;0.80;0.72;0.65;0.60;0.62;0.66;0.62;0.60;0.65;0.60;0.62;0.95"
            keyTimes="0;0.06;0.12;0.18;0.24;0.32;0.42;0.52;0.60;0.70;0.80;0.88;0.95;1"
            dur="9s" repeatCount="indefinite"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" xChannelSelector="R" yChannelSelector="G" result="disp">
          <animate attributeName="scale"
            values="14;11;8;5;3;1.5;1.8;1.2;1.6;1.0;1.5;1.1;1.4;14"
            keyTimes="0;0.06;0.12;0.18;0.24;0.32;0.42;0.52;0.60;0.70;0.80;0.88;0.95;1"
            dur="9s" repeatCount="indefinite"/>
        </feDisplacementMap>
        <feMorphology in="disp" operator="erode" radius="0.25" result="eaten">
          <animate attributeName="radius"
            values="2.4;1.9;1.4;0.95;0.55;0.30;0.20;0.30;0.18;0.28;0.15;0.25;0.20;2.4"
            keyTimes="0;0.06;0.12;0.18;0.24;0.32;0.42;0.52;0.60;0.70;0.80;0.88;0.95;1"
            dur="9s" repeatCount="indefinite"/>
        </feMorphology>
        <feComposite in="eaten" in2="disp" operator="in"/>
      </filter>
    </defs>
  </svg>
  <div class="quote" id="q"></div>
</div>
<script>
const QUOTES = ["Women have ruined the country and should not be allowed to vote."];
const LINES_CONFIG = { 4:{wpl:1,size:12}, 10:{wpl:3,size:6}, 15:{wpl:3,size:5}, 25:{wpl:4,size:4.5} };
function getConfig(wc) { if (wc<=4) return LINES_CONFIG[4]; if (wc<=10) return LINES_CONFIG[10]; if (wc<=18) return LINES_CONFIG[15]; return LINES_CONFIG[25]; }
function breakIntoLines(text, wpl) {
  const words = text.split(/\s+/);
  const totalLines = Math.ceil(words.length / wpl);
  const base = Math.floor(words.length / totalLines);
  const extra = words.length % totalLines;
  const lines = []; let idx = 0;
  for (let i = 0; i < totalLines; i++) { const take = base + (i < extra ? 1 : 0); lines.push(words.slice(idx, idx + take).join(' ')); idx += take; }
  return lines;
}
const quote = QUOTES[0].toUpperCase();
const wc = quote.split(/\s+/).length;
const config = getConfig(wc);
const lines = breakIntoLines(quote, config.wpl);

const q = document.getElementById('q');
q.style.fontSize = config.size + 'vmin';
q.style.lineHeight = '1.3';
lines.forEach(line => {
  const d = document.createElement('div');
  d.textContent = line;
  q.appendChild(d);
});
</script></body></html>
