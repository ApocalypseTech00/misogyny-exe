<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-weight: 900; }
  .container { width: 100vmin; height: 100vmin; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .container::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent, transparent 1px, rgba(0,0,0,0.12) 1px, rgba(0,0,0,0.12) 2px); pointer-events: none; z-index: 10; }
  canvas { position: absolute; inset: 0; display: block; z-index: 2; image-rendering: pixelated; }
</style></head><body>
<div class="container">
  <canvas id="c"></canvas>
</div>
<script>
const QUOTES = ["Women have ruined the country and should not be allowed to vote."];
const LINES_CONFIG = { 4:{wpl:1,size:0.12}, 10:{wpl:3,size:0.06}, 15:{wpl:3,size:0.05}, 25:{wpl:3,size:0.04} };
function getConfig(wc) { if (wc<=4) return LINES_CONFIG[4]; if (wc<=10) return LINES_CONFIG[10]; if (wc<=18) return LINES_CONFIG[15]; return LINES_CONFIG[25]; }
function breakIntoLines(text, wpl) {
  const words = text.split(/\s+/);
  const totalLines = Math.ceil(words.length / wpl);
  const base = Math.floor(words.length / totalLines);
  const extra = words.length % totalLines;
  const lines = []; let idx = 0;
  for (let i = 0; i < totalLines; i++) { const take = base + (i < extra ? 1 : 0); lines.push(words.slice(idx, idx + take).join(' ')); idx += take; }
  return lines;
}
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const off = document.createElement('canvas');
const offCtx = off.getContext('2d');

const quote = QUOTES[0].toUpperCase();
const wc = quote.split(/\s+/).length;
const config = getConfig(wc);
const lines = breakIntoLines(quote, config.wpl);

function syncSize() {
  const w = canvas.parentElement.clientWidth;
  const h = canvas.parentElement.clientHeight;
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w; canvas.height = h;
    off.width = w; off.height = h;
    drawText();
    return true;
  }
  return false;
}
function drawText() {
  offCtx.clearRect(0,0,off.width,off.height);
  offCtx.fillStyle = '#F918D0';
  offCtx.textAlign = 'center';
  offCtx.textBaseline = 'middle';
  let fontPx = Math.min(off.width, off.height) * config.size;
  offCtx.font = `900 italic ${fontPx}px Georgia, serif`;
  const maxW = off.width * 0.9;
  const widest = Math.max(...lines.map(l => offCtx.measureText(l).width));
  if (widest > maxW) fontPx *= maxW / widest;
  offCtx.font = `900 italic ${fontPx}px Georgia, serif`;
  const lh = fontPx * 1.3;
  const startY = off.height/2 - lh * (lines.length - 1) / 2;
  lines.forEach((l, i) => offCtx.fillText(l, off.width/2, startY + i * lh));
}
syncSize();
new ResizeObserver(syncSize).observe(canvas.parentElement);

const REVEAL_MS = 1400;
const HOLD_MS = 2200;
const PIXELATE_MS = 1200;
const CYCLE = REVEAL_MS + HOLD_MS + PIXELATE_MS;
let start = performance.now();
const MAX_PIX = 28;

function frame(t) {
  syncSize();
  const e = (t - start) % CYCLE;
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  let pix;
  if (e < REVEAL_MS) {
    const p = e / REVEAL_MS;
    pix = Math.max(1, Math.round(MAX_PIX * (1 - Math.pow(p, 0.7))));
  } else if (e < REVEAL_MS + HOLD_MS) {
    pix = 1;
  } else {
    const p = (e - REVEAL_MS - HOLD_MS) / PIXELATE_MS;
    pix = Math.max(1, Math.round(MAX_PIX * Math.pow(p, 0.7)));
  }
  if (pix === 1) {
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(off, 0, 0);
  } else {
    const sw = Math.max(1, Math.floor(canvas.width / pix));
    const sh = Math.max(1, Math.floor(canvas.height / pix));
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(off, 0, 0, sw, sh);
    ctx.drawImage(canvas, 0, 0, sw, sh, 0, 0, canvas.width, canvas.height);
    ctx.clearRect(0, 0, sw, sh);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, sw, sh);
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script></body></html>
