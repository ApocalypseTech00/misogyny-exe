<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-weight: 900; }
  .container { width: 100vmin; height: 100vmin; position: relative; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .container::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent, transparent 1px, rgba(0,0,0,0.12) 1px, rgba(0,0,0,0.12) 2px); pointer-events: none; z-index: 10; }
  .quote-line { text-align: center; text-transform: uppercase; color: #F918D0; letter-spacing: 0.05em; min-height: 1.2em; padding: 0 5vmin; }
  .word { display: inline-block; opacity: 0; transform: scale(3.2); margin: 0 0.25em; transition: opacity 0.05s linear, transform 0.05s linear; }
  .word.slammed { opacity: 1; transform: scale(1); animation: slamShake 0.18s ease-out; }
  @keyframes slamShake {
    0%   { transform: scale(1); }
    18%  { transform: scale(1.08) translate(2px, -1px); }
    36%  { transform: scale(0.97) translate(-3px, 1px); }
    54%  { transform: scale(1.02) translate(1px, 2px); }
    100% { transform: scale(1); }
  }
  .label { position: absolute; bottom: 30px; font-size: 10px; color: #F918D030; letter-spacing: 0.3em; text-transform: uppercase; z-index: 11; }
</style></head><body>
<div class="container">
  <div id="quote"></div>
</div>
<script>
const QUOTES = ["Women have ruined the country and should not be allowed to vote."];
const LINES_CONFIG = { 4:{wpl:1,size:12}, 10:{wpl:3,size:6}, 15:{wpl:3,size:5}, 25:{wpl:3,size:4} };
function getConfig(wc) { if (wc<=4) return LINES_CONFIG[4]; if (wc<=10) return LINES_CONFIG[10]; if (wc<=18) return LINES_CONFIG[15]; return LINES_CONFIG[25]; }
function breakIntoLines(text, wpl) {
  const words = text.split(/\s+/);
  const totalLines = Math.ceil(words.length / wpl);
  const base = Math.floor(words.length / totalLines);
  const extra = words.length % totalLines;
  const lines = []; let idx = 0;
  for (let i = 0; i < totalLines; i++) { const take = base + (i < extra ? 1 : 0); lines.push(words.slice(idx, idx + take).join(' ')); idx += take; }
  return lines;
}

function render() {
  const quoteEl = document.getElementById('quote');
  quoteEl.innerHTML = '';
  const quote = QUOTES[0];
  const wc = quote.split(/\s+/).length;
  const config = getConfig(wc);
  const lines = breakIntoLines(quote, config.wpl);

  const allWords = [];
  lines.forEach(line => {
    const lineEl = document.createElement('div');
    lineEl.className = 'quote-line';
    lineEl.style.fontSize = config.size + 'vmin';
    lineEl.style.lineHeight = '1.3';
    line.split(/\s+/).forEach(w => {
      const wordEl = document.createElement('span');
      wordEl.className = 'word';
      wordEl.textContent = w;
      lineEl.appendChild(wordEl);
      allWords.push(wordEl);
    });
    quoteEl.appendChild(lineEl);
  });

  // Slam each word in sequence
  allWords.forEach((w, i) => {
    setTimeout(() => w.classList.add('slammed'), 280 + i * 280);
  });
  // Hold then loop
  const totalMs = 280 + allWords.length * 280 + 3500;
  setTimeout(() => {
    allWords.forEach(w => { w.classList.remove('slammed'); w.style.opacity = '0'; w.style.transform = 'scale(3.2)'; });
    setTimeout(render, 600);
  }, totalMs);
}
render();
</script></body></html>
