<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-weight: 900; }
  .container { width: 100vmin; height: 100vmin; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .container::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent, transparent 1px, rgba(0,0,0,0.12) 1px, rgba(0,0,0,0.12) 2px); pointer-events: none; z-index: 10; }
  .quote { position: relative; z-index: 5; text-align: center; text-transform: uppercase; letter-spacing: 0.05em; color: #F918D0; padding: 0 5vmin; line-height: 1.3; max-width: 96vmin; }
  .ch { display: inline-block; will-change: transform; }
  .space { display: inline-block; width: 0.35em; }
  .lurch { animation: lurch 0.18s ease-in-out; }
  @keyframes lurch {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(-6px, 4px) rotate(-3deg); }
    50%  { transform: translate(8px, -3px) rotate(2deg); }
    75%  { transform: translate(-4px, 6px) rotate(-1deg); }
    100% { transform: translate(0, 0); }
  }
</style></head><body>
<div class="container">
  <div class="quote" id="q"></div>
</div>
<script>
const QUOTES = ["Women have ruined the country and should not be allowed to vote."];
const LINES_CONFIG = { 4:{wpl:1,size:12}, 10:{wpl:3,size:6}, 15:{wpl:3,size:5}, 25:{wpl:3,size:4} };
function getConfig(wc) { if (wc<=4) return LINES_CONFIG[4]; if (wc<=10) return LINES_CONFIG[10]; if (wc<=18) return LINES_CONFIG[15]; return LINES_CONFIG[25]; }
function breakIntoLines(text, wpl) {
  const words = text.split(/\s+/);
  const totalLines = Math.ceil(words.length / wpl);
  const base = Math.floor(words.length / totalLines);
  const extra = words.length % totalLines;
  const lines = []; let idx = 0;
  for (let i = 0; i < totalLines; i++) { const take = base + (i < extra ? 1 : 0); lines.push(words.slice(idx, idx + take).join(' ')); idx += take; }
  return lines;
}
const quote = QUOTES[0].toUpperCase();
const wc = quote.split(/\s+/).length;
const config = getConfig(wc);
const lines = breakIntoLines(quote, config.wpl);
const q = document.getElementById('q');
q.style.fontSize = config.size + 'vmin';

const chars = [];
lines.forEach(line => {
  const lineEl = document.createElement('div');
  for (const c of line) {
    if (c === ' ') {
      const sp = document.createElement('span'); sp.className = 'space'; lineEl.appendChild(sp);
    } else {
      const s = document.createElement('span'); s.className = 'ch'; s.textContent = c; lineEl.appendChild(s); chars.push(s);
    }
  }
  q.appendChild(lineEl);
});

function jitter() {
  chars.forEach(c => {
    const dx = (Math.random() - 0.5) * 3;
    const dy = (Math.random() - 0.5) * 3;
    c.style.transform = `translate(${dx.toFixed(2)}px, ${dy.toFixed(2)}px)`;
  });
  requestAnimationFrame(jitter);
}
jitter();

function lurch() {
  const n = 5 + Math.floor(Math.random() * 8);
  for (let i = 0; i < n; i++) {
    const c = chars[Math.floor(Math.random() * chars.length)];
    c.classList.remove('lurch'); void c.offsetWidth; c.classList.add('lurch');
  }
  setTimeout(lurch, 1400 + Math.random() * 2200);
}
setTimeout(lurch, 1500);
</script></body></html>
