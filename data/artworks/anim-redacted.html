<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-weight: 900;
  }
  .container {
    width: 100vmin; height: 100vmin;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .container::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      to bottom, transparent, transparent 1px,
      rgba(0,0,0,0.12) 1px, rgba(0,0,0,0.12) 2px
    );
    pointer-events: none; z-index: 10;
  }
  .quote-line {
    text-align: center;
    text-transform: uppercase;
    color: #F918D0;
    letter-spacing: 0.05em;
    min-height: 1.2em;
    padding: 0 5vmin;
  }
  .word {
    position: relative;
    display: inline-block;
    margin: 0;
  }
  .bar {
    position: absolute;
    inset: -0.05em 0 -0.05em 0;
    background: #F918D0;
    box-shadow: 0 0 8px #F918D080, 0 0 20px #F918D030;
    z-index: 2;
    opacity: 1;
  }
  .word.glitching .bar {
    animation: glitchOut 0.32s steps(1) forwards;
  }
  @keyframes glitchOut {
    0%   { opacity: 1; transform: translate(0,0); }
    10%  { opacity: 0; transform: translate(2px,-1px); }
    18%  { opacity: 1; transform: translate(-3px,2px); }
    28%  { opacity: 0; transform: translate(0,0); }
    40%  { opacity: 1; transform: translate(4px,-2px); }
    52%  { opacity: 0; }
    65%  { opacity: 1; transform: translate(-2px,1px); }
    78%  { opacity: 0; }
    100% { opacity: 0; transform: translate(0,0); }
  }
  .label {
    position: absolute; bottom: 30px;
    font-size: 10px; color: #F918D030;
    letter-spacing: 0.3em; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="container">
  <div id="quote"></div>
</div>
<script>
const QUOTES = ["Women have ruined the country and should not be allowed to vote."];

const LINES_CONFIG = {
  4:  { wpl: 1, size: 12 },
  10: { wpl: 3, size: 6 },
  15: { wpl: 3, size: 5 },
  25: { wpl: 3, size: 4 },
};
function getConfig(wc) {
  if (wc <= 4)  return LINES_CONFIG[4];
  if (wc <= 10) return LINES_CONFIG[10];
  if (wc <= 18) return LINES_CONFIG[15];
  return LINES_CONFIG[25];
}
function breakIntoLines(text, wpl) {
  const words = text.split(/\s+/);
  const totalLines = Math.ceil(words.length / wpl);
  const base = Math.floor(words.length / totalLines);
  const extra = words.length % totalLines;
  const lines = []; let idx = 0;
  for (let i = 0; i < totalLines; i++) {
    const take = base + (i < extra ? 1 : 0);
    lines.push(words.slice(idx, idx + take).join(' '));
    idx += take;
  }
  return lines;
}

const quoteEl = document.getElementById('quote');

function render() {
  const quote = QUOTES[0];
  const wc = quote.split(/\s+/).length;
  const config = getConfig(wc);
  const lines = breakIntoLines(quote, config.wpl);

  quoteEl.innerHTML = '';
  quoteEl.style.opacity = '1';

  const allWords = [];
  lines.forEach(line => {
    const lineEl = document.createElement('div');
    lineEl.className = 'quote-line';
    lineEl.style.fontSize = config.size + 'vmin';
    lineEl.style.lineHeight = '1.3';
    const wordsArr = line.split(/\s+/);
    wordsArr.forEach((w, i) => {
      const wordEl = document.createElement('span');
      wordEl.className = 'word';
      wordEl.textContent = i < wordsArr.length - 1 ? w + '\u00A0' : w;
      const bar = document.createElement('span');
      bar.className = 'bar';
      wordEl.appendChild(bar);
      lineEl.appendChild(wordEl);
      allWords.push(wordEl);
    });
    quoteEl.appendChild(lineEl);
  });

  // Glitch bars out sequentially after 700ms hold
  setTimeout(() => {
    allWords.forEach((w, i) => {
      setTimeout(() => w.classList.add('glitching'), i * 140);
    });
  }, 700);

  // Hold revealed, restore bars, loop
  const totalGlitchMs = 700 + allWords.length * 140 + 320;
  setTimeout(() => {
    allWords.forEach((w, i) => {
      setTimeout(() => w.classList.remove('glitching'), (allWords.length - 1 - i) * 70);
    });
    setTimeout(render, allWords.length * 70 + 1100);
  }, totalGlitchMs + 3500);
}

render();
</script>
</body>
</html>
