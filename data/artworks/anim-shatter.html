<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-weight: 900; }
  .container { width: 100vmin; height: 100vmin; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .container::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent, transparent 1px, rgba(0,0,0,0.12) 1px, rgba(0,0,0,0.12) 2px); pointer-events: none; z-index: 10; }
  .vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%); pointer-events: none; z-index: 9; }
  canvas { position: absolute; inset: 0; display: block; z-index: 2; }
</style></head><body>
<div class="container">
  <div class="vignette"></div>
  <canvas id="c"></canvas>
</div>
<script>
const QUOTES = ["Women have ruined the country and should not be allowed to vote."];
const LINES_CONFIG = { 4:{wpl:1,size:0.12}, 10:{wpl:3,size:0.06}, 15:{wpl:3,size:0.05}, 25:{wpl:3,size:0.04} };
function getConfig(wc) { if (wc<=4) return LINES_CONFIG[4]; if (wc<=10) return LINES_CONFIG[10]; if (wc<=18) return LINES_CONFIG[15]; return LINES_CONFIG[25]; }
function breakIntoLines(text, wpl) {
  const words = text.split(/\s+/);
  const totalLines = Math.ceil(words.length / wpl);
  const base = Math.floor(words.length / totalLines);
  const extra = words.length % totalLines;
  const lines = []; let idx = 0;
  for (let i = 0; i < totalLines; i++) { const take = base + (i < extra ? 1 : 0); lines.push(words.slice(idx, idx + take).join(' ')); idx += take; }
  return lines;
}

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
function syncSize() {
  const w = canvas.parentElement.clientWidth;
  const h = canvas.parentElement.clientHeight;
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w; canvas.height = h;
    layoutChars();
  }
}

const quote = QUOTES[0].toUpperCase();
const wc = quote.split(/\s+/).length;
const config = getConfig(wc);
const lines = breakIntoLines(quote, config.wpl);

let chars = [];
function layoutChars() {
  chars = [];
  let fontPx = Math.min(canvas.width, canvas.height) * config.size;
  ctx.font = `900 italic ${fontPx}px Georgia, serif`;
  const maxW = canvas.width * 0.9;
  const widest = Math.max(...lines.map(l => ctx.measureText(l).width));
  if (widest > maxW) fontPx *= maxW / widest;
  ctx.font = `900 italic ${fontPx}px Georgia, serif`;
  const lh = fontPx * 1.3;
  const startY = canvas.height / 2 - lh * (lines.length - 1) / 2;
  lines.forEach((line, li) => {
    const w = ctx.measureText(line).width;
    let x = canvas.width / 2 - w / 2;
    for (const c of line) {
      const cw = ctx.measureText(c).width;
      chars.push({ ch: c, x0: x + cw/2, y0: startY + li * lh, x: x + cw/2, y: startY + li * lh, vx: 0, vy: 0, rot: 0, vrot: 0, fontPx });
      x += cw;
    }
  });
}
syncSize();
new ResizeObserver(syncSize).observe(canvas.parentElement);

const REVEAL_MS = 800;
const HOLD_MS = 2400;
const SHATTER_MS = 1700;
const REASSEMBLE_MS = 900;
const CYCLE_MS = REVEAL_MS + HOLD_MS + SHATTER_MS + REASSEMBLE_MS;
let cycleStart = performance.now();
let shatterParams = null;

function frame(t) {
  syncSize();
  const elapsed = (t - cycleStart) % CYCLE_MS;
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.fillStyle = '#F918D0';
  ctx.shadowColor = '#F918D0';
  ctx.shadowBlur = 10;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (elapsed < REVEAL_MS) {
    const p = elapsed / REVEAL_MS;
    chars.forEach(c => {
      ctx.globalAlpha = p;
      ctx.font = `900 italic ${c.fontPx}px Georgia, serif`;
      ctx.fillText(c.ch, c.x0, c.y0);
    });
  } else if (elapsed < REVEAL_MS + HOLD_MS) {
    chars.forEach(c => {
      ctx.font = `900 italic ${c.fontPx}px Georgia, serif`;
      ctx.fillText(c.ch, c.x0, c.y0);
    });
  } else if (elapsed < REVEAL_MS + HOLD_MS + SHATTER_MS) {
    const local = elapsed - REVEAL_MS - HOLD_MS;
    if (!shatterParams || shatterParams.start !== cycleStart) {
      shatterParams = { start: cycleStart };
      chars.forEach(c => {
        const angle = Math.atan2(c.y0 - canvas.height/2, c.x0 - canvas.width/2) + (Math.random()-0.5)*0.6;
        const speed = 280 + Math.random() * 320;
        c.vx = Math.cos(angle) * speed;
        c.vy = Math.sin(angle) * speed - 220;
        c.vrot = (Math.random() - 0.5) * 8;
      });
    }
    const dt = local / 1000;
    chars.forEach(c => {
      const px = c.x0 + c.vx * dt;
      const py = c.y0 + c.vy * dt + 0.5 * 1100 * dt * dt;
      const rot = c.vrot * dt;
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(rot);
      ctx.font = `900 italic ${c.fontPx}px Georgia, serif`;
      ctx.globalAlpha = Math.max(0, 1 - dt / (SHATTER_MS/1000) * 0.85);
      ctx.fillText(c.ch, 0, 0);
      ctx.restore();
    });
  } else {
    const local = elapsed - REVEAL_MS - HOLD_MS - SHATTER_MS;
    const p = local / REASSEMBLE_MS;
    ctx.globalAlpha = p;
    chars.forEach(c => {
      ctx.font = `900 italic ${c.fontPx}px Georgia, serif`;
      ctx.fillText(c.ch, c.x0, c.y0);
    });
    if (p >= 1) { cycleStart = t; shatterParams = null; }
  }
  ctx.restore();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script></body></html>
