<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-weight: 900; cursor: crosshair; }
  .container { width: 100vmin; height: 100vmin; position: relative; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .container::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent, transparent 1px, rgba(0,0,0,0.12) 1px, rgba(0,0,0,0.12) 2px); pointer-events: none; z-index: 10; }
  .vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%); pointer-events: none; z-index: 9; }
  .quote-line { text-align: center; text-transform: uppercase; color: #F918D0; letter-spacing: 0.05em; min-height: 1.2em; padding: 0 5vmin; text-shadow: 0 0 8px #F918D080, 0 0 20px #F918D030; }
  .ch {
    display: inline-block;
    transform: translateY(0);
    will-change: transform, color;
  }
  .label { position: absolute; bottom: 30px; font-size: 10px; color: #F918D030; letter-spacing: 0.3em; text-transform: uppercase; z-index: 11; }
</style></head><body>
<div class="container">
  <div class="vignette"></div>
  <div id="quote"></div>
</div>
<script>
const QUOTES = ["Women have ruined the country and should not be allowed to vote."];
const LINES_CONFIG = { 4:{wpl:1,size:12}, 10:{wpl:3,size:6}, 15:{wpl:3,size:5}, 25:{wpl:3,size:4} };
function getConfig(wc) { if (wc<=4) return LINES_CONFIG[4]; if (wc<=10) return LINES_CONFIG[10]; if (wc<=18) return LINES_CONFIG[15]; return LINES_CONFIG[25]; }
function breakIntoLines(text, wpl) {
  const words = text.split(/\s+/);
  const totalLines = Math.ceil(words.length / wpl);
  const base = Math.floor(words.length / totalLines);
  const extra = words.length % totalLines;
  const lines = []; let idx = 0;
  for (let i = 0; i < totalLines; i++) { const take = base + (i < extra ? 1 : 0); lines.push(words.slice(idx, idx + take).join(' ')); idx += take; }
  return lines;
}

const quoteEl = document.getElementById('quote');
const quote = QUOTES[0];
const wc = quote.split(/\s+/).length;
const config = getConfig(wc);
const lines = breakIntoLines(quote, config.wpl);

const chars = [];
lines.forEach(line => {
  const lineEl = document.createElement('div');
  lineEl.className = 'quote-line';
  lineEl.style.fontSize = config.size + 'vmin';
  lineEl.style.lineHeight = '1.3';
  for (const c of line) {
    const span = document.createElement('span');
    span.className = 'ch';
    span.textContent = c === ' ' ? '\u00A0' : c;
    lineEl.appendChild(span);
    if (c !== ' ') chars.push({ el: span });
  }
  quoteEl.appendChild(lineEl);
});

// Ripple emitters: either user taps OR auto-emitted periodically from random positions
const ripples = [];
function addRipple(x, y) {
  ripples.push({ x, y, t: performance.now() });
  if (ripples.length > 8) ripples.shift();
}

document.addEventListener('mousemove', (e) => {
  if (Math.random() < 0.15) addRipple(e.clientX, e.clientY);
});
document.addEventListener('click', (e) => addRipple(e.clientX, e.clientY));

// Auto-emit ripples every 1.2s
setInterval(() => {
  const x = Math.random() * window.innerWidth;
  const y = window.innerHeight * (0.3 + Math.random() * 0.4);
  addRipple(x, y);
}, 1200);

function animate(t) {
  // Remove old ripples
  while (ripples.length && t - ripples[0].t > 2200) ripples.shift();

  const RIPPLE_SPEED = 380; // px per second
  const RIPPLE_WIDTH = 80;
  const MAX_DISPLACE = 14;

  chars.forEach(c => {
    const r = c.el.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    let dx = 0, dy = 0, glow = 0;
    for (const rp of ripples) {
      const age = (t - rp.t) / 1000;
      const radius = age * RIPPLE_SPEED;
      const distX = cx - rp.x, distY = cy - rp.y;
      const dist = Math.sqrt(distX * distX + distY * distY);
      const diff = Math.abs(dist - radius);
      if (diff < RIPPLE_WIDTH) {
        const intensity = (1 - diff / RIPPLE_WIDTH) * Math.max(0, 1 - age / 2.2);
        const angle = Math.atan2(distY, distX);
        dx += Math.cos(angle) * MAX_DISPLACE * intensity;
        dy += Math.sin(angle) * MAX_DISPLACE * intensity;
        glow = Math.max(glow, intensity);
      }
    }
    c.el.style.transform = `translate(${dx}px, ${dy}px)`;
    c.el.style.textShadow = glow > 0.1
      ? `0 0 ${8 + glow * 20}px #F918D0, 0 0 ${20 + glow * 30}px #F918D0`
      : '0 0 8px #F918D080, 0 0 20px #F918D030';
  });
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script></body></html>
