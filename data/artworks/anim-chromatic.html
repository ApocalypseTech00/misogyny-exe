<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-weight: 900; cursor: crosshair; }
  .container { width: 100vmin; height: 100vmin; position: relative; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .container::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent, transparent 1px, rgba(0,0,0,0.12) 1px, rgba(0,0,0,0.12) 2px); pointer-events: none; z-index: 10; }
  .quote-line { text-align: center; text-transform: uppercase; letter-spacing: 0.05em; min-height: 1.2em; padding: 0 5vmin; position: relative; }
  .layer { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .base { color: #F918D0; position: relative; }
  .red  { color: rgba(255, 0, 100, 0.85); mix-blend-mode: screen; }
  .white { color: rgba(255, 255, 255, 0.8); mix-blend-mode: screen; }
</style></head><body>
<div class="container">
  <div id="quote"></div>
</div>
<script>
const QUOTES = ["Women have ruined the country and should not be allowed to vote."];
const LINES_CONFIG = { 4:{wpl:1,size:12}, 10:{wpl:3,size:6}, 15:{wpl:3,size:5}, 25:{wpl:3,size:4} };
function getConfig(wc) { if (wc<=4) return LINES_CONFIG[4]; if (wc<=10) return LINES_CONFIG[10]; if (wc<=18) return LINES_CONFIG[15]; return LINES_CONFIG[25]; }
function breakIntoLines(text, wpl) {
  const words = text.split(/\s+/);
  const totalLines = Math.ceil(words.length / wpl);
  const base = Math.floor(words.length / totalLines);
  const extra = words.length % totalLines;
  const lines = []; let idx = 0;
  for (let i = 0; i < totalLines; i++) { const take = base + (i < extra ? 1 : 0); lines.push(words.slice(idx, idx + take).join(' ')); idx += take; }
  return lines;
}

const quoteEl = document.getElementById('quote');
const quote = QUOTES[0];
const wc = quote.split(/\s+/).length;
const config = getConfig(wc);
const lines = breakIntoLines(quote, config.wpl);

const reds = [], cyans = [];
lines.forEach(line => {
  const lineEl = document.createElement('div');
  lineEl.className = 'quote-line';
  lineEl.style.fontSize = config.size + 'vmin';
  lineEl.style.lineHeight = '1.3';

  const red = document.createElement('span');
  red.className = 'layer red'; red.textContent = line;
  const white = document.createElement('span');
  white.className = 'layer white'; white.textContent = line;
  const base = document.createElement('span');
  base.className = 'base'; base.textContent = line;

  lineEl.appendChild(red);
  lineEl.appendChild(white);
  lineEl.appendChild(base);
  quoteEl.appendChild(lineEl);
  reds.push(red); cyans.push(white);
});

// Track cursor velocity; split magnitude scales with speed.
let mx = window.innerWidth / 2, my = window.innerHeight / 2;
let px = mx, py = my;
let vx = 0, vy = 0;
let realMouse = false, lastMouseMs = 0;

document.addEventListener('mousemove', (e) => {
  mx = e.clientX; my = e.clientY;
  realMouse = true; lastMouseMs = performance.now();
});

function tick(t) {
  if (!realMouse || t - lastMouseMs > 600) {
    // Lissajous auto-motion
    realMouse = false;
    mx = window.innerWidth / 2 + Math.cos(t / 900) * 240;
    my = window.innerHeight / 2 + Math.sin(t / 640) * 160;
  }
  // Velocity
  vx = (mx - px);
  vy = (my - py);
  px = mx; py = my;
  const speed = Math.min(40, Math.sqrt(vx * vx + vy * vy));

  // Direction of split: orthogonal-ish to velocity, with a base idle offset
  const baseSplit = 3;
  const kick = speed * 0.8;
  const totalSplit = baseSplit + kick;

  // Red goes opposite of velocity X, cyan follows
  const dirX = (vx >= 0 ? 1 : -1);
  const rX = -dirX * totalSplit;
  const cX = dirX * totalSplit;
  const rY = -Math.sign(vy) * (totalSplit * 0.35);
  const cY = Math.sign(vy) * (totalSplit * 0.35);

  reds.forEach(el => el.style.transform = `translate(${rX}px, ${rY}px)`);
  cyans.forEach(el => el.style.transform = `translate(${cX}px, ${cY}px)`);

  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script></body></html>
