<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-weight: 900; cursor: crosshair; }
  .container { width: 100vmin; height: 100vmin; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .container::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent, transparent 1px, rgba(0,0,0,0.12) 1px, rgba(0,0,0,0.12) 2px); pointer-events: none; z-index: 10; }
  .vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%); pointer-events: none; z-index: 9; }
  .quote { position: relative; z-index: 4; text-align: center; text-transform: uppercase; letter-spacing: 0.05em; color: #F918D0; text-shadow: 0 0 8px #F918D080, 0 0 20px #F918D030; padding: 0 5vmin; line-height: 1.3; max-width: 96vmin; }
  canvas { position: absolute; inset: 0; display: block; z-index: 6; pointer-events: none; }
</style></head><body>
<div class="container">
  <div class="vignette"></div>
  <div class="quote" id="q"></div>
  <canvas id="c"></canvas>
</div>
<script>
const QUOTES = ["Women have ruined the country and should not be allowed to vote."];
const LINES_CONFIG = { 4:{wpl:1,size:12}, 10:{wpl:3,size:6}, 15:{wpl:3,size:5}, 25:{wpl:3,size:4} };
function getConfig(wc) { if (wc<=4) return LINES_CONFIG[4]; if (wc<=10) return LINES_CONFIG[10]; if (wc<=18) return LINES_CONFIG[15]; return LINES_CONFIG[25]; }
function breakIntoLines(text, wpl) {
  const words = text.split(/\s+/);
  const totalLines = Math.ceil(words.length / wpl);
  const base = Math.floor(words.length / totalLines);
  const extra = words.length % totalLines;
  const lines = []; let idx = 0;
  for (let i = 0; i < totalLines; i++) { const take = base + (i < extra ? 1 : 0); lines.push(words.slice(idx, idx + take).join(' ')); idx += take; }
  return lines;
}
const quote = QUOTES[0].toUpperCase();
const wc = quote.split(/\s+/).length;
const config = getConfig(wc);
const lines = breakIntoLines(quote, config.wpl);
const q = document.getElementById('q');
q.style.fontSize = config.size + 'vmin';
lines.forEach(l => { const d = document.createElement('div'); d.textContent = l; q.appendChild(d); });

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const off = document.createElement('canvas');
const offCtx = off.getContext('2d', { willReadFrequently: true });
let srcData = null;

function sync() {
  const w = canvas.parentElement.clientWidth, h = canvas.parentElement.clientHeight;
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w; canvas.height = h;
    off.width = w; off.height = h;
    offCtx.clearRect(0,0,w,h);
    offCtx.fillStyle = '#fff';
    offCtx.textAlign = 'center';
    offCtx.textBaseline = 'middle';
    let fontPx = Math.min(w, h) * (config.size / 100);
    offCtx.font = `900 italic ${fontPx}px Georgia, serif`;
    const maxW = w * 0.9;
    const widest = Math.max(...lines.map(l => offCtx.measureText(l).width));
    if (widest > maxW) fontPx *= maxW / widest;
    offCtx.font = `900 italic ${fontPx}px Georgia, serif`;
    const lh = fontPx * 1.3;
    const sy = h/2 - lh * (lines.length - 1) / 2;
    lines.forEach((l, i) => offCtx.fillText(l, w/2, sy + i * lh));
    srcData = offCtx.getImageData(0,0,w,h).data;
  }
}
sync(); new ResizeObserver(sync).observe(canvas.parentElement);

let mx = -1, my = -1, hovered = false;
const container = document.querySelector('.container');
container.addEventListener('mousemove', (e) => {
  const r = container.getBoundingClientRect();
  mx = e.clientX - r.left; my = e.clientY - r.top; hovered = true;
});
container.addEventListener('mouseleave', () => { hovered = false; });

const SCRAMBLE = '!@#$%^&*0123ABCDEFGHIJKLMNOPQRSTUVWXYZ\u2588\u2593\u2592\u2591';

function draw(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (hovered && srcData) {
    const R = Math.min(canvas.width, canvas.height) * 0.22;
    // Erase HTML text beneath the spotlight by painting bg.
    ctx.save();
    ctx.beginPath(); ctx.arc(mx, my, R, 0, Math.PI*2); ctx.clip();
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(mx - R, my - R, R*2, R*2);
    const GRID = 8;
    ctx.fillStyle = '#F918D0';
    ctx.shadowColor = '#F918D0';
    ctx.shadowBlur = 3;
    for (let y = my - R; y < my + R; y += GRID) {
      for (let x = mx - R; x < mx + R; x += GRID) {
        const ix = Math.floor(x), iy = Math.floor(y);
        if (ix < 0 || iy < 0 || ix >= off.width || iy >= off.height) continue;
        const alpha = srcData[(iy * off.width + ix) * 4 + 3];
        if (alpha < 40) continue;
        const dx = x - mx, dy = y - my;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > R) continue;
        const tR = dist / R;
        if (tR < 0.45) {
          const r = GRID * 0.5 * (1 - tR * 0.6);
          ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
        } else {
          const seed = Math.floor(t/70) + Math.floor(x/GRID)*31 + Math.floor(y/GRID)*97;
          const ch = SCRAMBLE[Math.abs(seed) % SCRAMBLE.length];
          ctx.save();
          ctx.font = `700 ${GRID*1.1}px 'Courier New', monospace`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(ch, x, y);
          ctx.restore();
        }
      }
    }
    ctx.restore();
  }
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script></body></html>
