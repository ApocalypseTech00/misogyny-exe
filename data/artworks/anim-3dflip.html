<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-weight: 900; }
  .container { width: 100vmin; height: 100vmin; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; perspective: 1200px; }
  .container::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent, transparent 1px, rgba(0,0,0,0.12) 1px, rgba(0,0,0,0.12) 2px); pointer-events: none; z-index: 10; }
  .vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%); pointer-events: none; z-index: 9; }
  .quote { position: relative; text-align: center; text-transform: uppercase; letter-spacing: 0.05em; padding: 0 5vmin; line-height: 1.3; max-width: 96vmin; transform-style: preserve-3d; }
  .flip { display: inline-block; position: relative; transform-style: preserve-3d; will-change: transform; }
  .flip .face { display: inline-block; backface-visibility: hidden; color: #F918D0; text-shadow: 0 0 10px #F918D0aa, 0 0 22px #F918D044; }
  .flip .back { position: absolute; inset: 0; transform: rotateY(180deg); color: #F918D066; }
  .space { display: inline-block; width: 0.4em; }
  @keyframes flipOnce {
    0%   { transform: rotateY(0deg); }
    45%  { transform: rotateY(0deg); }
    60%  { transform: rotateY(-180deg); }
    95%  { transform: rotateY(-180deg); }
    100% { transform: rotateY(-360deg); }
  }
</style></head><body>
<div class="container">
  <div class="vignette"></div>
  <div class="quote" id="q"></div>
</div>
<script>
const QUOTES = ["Women have ruined the country and should not be allowed to vote."];
const LINES_CONFIG = { 4:{wpl:1,size:12}, 10:{wpl:3,size:6}, 15:{wpl:3,size:5}, 25:{wpl:3,size:4} };
function getConfig(wc) { if (wc<=4) return LINES_CONFIG[4]; if (wc<=10) return LINES_CONFIG[10]; if (wc<=18) return LINES_CONFIG[15]; return LINES_CONFIG[25]; }
function breakIntoLines(text, wpl) {
  const words = text.split(/\s+/);
  const totalLines = Math.ceil(words.length / wpl);
  const base = Math.floor(words.length / totalLines);
  const extra = words.length % totalLines;
  const lines = []; let idx = 0;
  for (let i = 0; i < totalLines; i++) { const take = base + (i < extra ? 1 : 0); lines.push(words.slice(idx, idx + take).join(' ')); idx += take; }
  return lines;
}
const quote = QUOTES[0].toUpperCase();
const wc = quote.split(/\s+/).length;
const config = getConfig(wc);
const lines = breakIntoLines(quote, config.wpl);
const q = document.getElementById('q');
q.style.fontSize = config.size + 'vmin';

const flips = [];
lines.forEach(line => {
  const lineEl = document.createElement('div');
  [...line].forEach(c => {
    if (c === ' ') { const sp = document.createElement('span'); sp.className = 'space'; lineEl.appendChild(sp); return; }
    const f = document.createElement('span'); f.className = 'flip';
    const front = document.createElement('span'); front.className = 'face front'; front.textContent = c; f.appendChild(front);
    const back = document.createElement('span'); back.className = 'face back'; back.textContent = c; f.appendChild(back);
    lineEl.appendChild(f);
    flips.push(f);
  });
  q.appendChild(lineEl);
});

function flipWave() {
  flips.forEach((f, i) => {
    const delay = i * 60 + Math.random() * 200;
    f.style.animation = 'none';
    void f.offsetWidth;
    f.style.animation = `flipOnce 2.6s ${delay}ms cubic-bezier(0.6, 0, 0.3, 1)`;
  });
  const totalMs = flips.length * 60 + 200 + 2600;
  setTimeout(flipWave, totalMs + 1800);
}
flipWave();
</script></body></html>
