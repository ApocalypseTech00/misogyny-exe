<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-weight: 900;
  }
  .container {
    width: 100vmin; height: 100vmin;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .container::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      to bottom, transparent, transparent 1px,
      rgba(0,0,0,0.12) 1px, rgba(0,0,0,0.12) 2px
    );
    pointer-events: none; z-index: 10;
  }
  .quote-line {
    text-align: center;
    text-transform: uppercase;
    color: #F918D0;
    letter-spacing: 0.05em;
    min-height: 1.2em;
    padding: 0 5vmin;
    animation: flicker 5.4s infinite;
  }
  .quote-line:nth-child(2) { animation-delay: -1.7s; animation-duration: 5.9s; }
  .quote-line:nth-child(3) { animation-delay: -3.4s; animation-duration: 6.3s; }
  .quote-line:nth-child(4) { animation-delay: -2.2s; animation-duration: 5.6s; }

  @keyframes flicker {
    0%   { opacity: 1; }
    2%   { opacity: 0.18; transform: translateX(-1px); }
    3%   { opacity: 1; transform: translateX(0); }
    18%  { opacity: 1; }
    19%  { opacity: 0.05; }
    21%  { opacity: 1; }
    35%  { opacity: 1; }
    36%  { opacity: 0.4; transform: translateX(2px); }
    37%  { opacity: 0; }
    40%  { opacity: 1; transform: translateX(0); }
    62%  { opacity: 1; }
    63%  { opacity: 0.6; }
    64%  { opacity: 1; }
    82%  { opacity: 1; }
    83%  { opacity: 0.1; transform: translateX(-2px); }
    85%  { opacity: 1; transform: translateX(0); }
    100% { opacity: 1; }
  }

  .label {
    position: absolute; bottom: 30px;
    font-size: 10px; color: #F918D030;
    letter-spacing: 0.3em; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="container">
  <div id="quote"></div>
</div>
<script>
const QUOTES = ["Women have ruined the country and should not be allowed to vote."];

const LINES_CONFIG = {
  4:  { wpl: 1, size: 12 },
  10: { wpl: 3, size: 6 },
  15: { wpl: 3, size: 5 },
  25: { wpl: 3, size: 4 },
};
function getConfig(wc) {
  if (wc <= 4)  return LINES_CONFIG[4];
  if (wc <= 10) return LINES_CONFIG[10];
  if (wc <= 18) return LINES_CONFIG[15];
  return LINES_CONFIG[25];
}
function breakIntoLines(text, wpl) {
  const words = text.split(/\s+/);
  const totalLines = Math.ceil(words.length / wpl);
  const base = Math.floor(words.length / totalLines);
  const extra = words.length % totalLines;
  const lines = []; let idx = 0;
  for (let i = 0; i < totalLines; i++) {
    const take = base + (i < extra ? 1 : 0);
    lines.push(words.slice(idx, idx + take).join(' '));
    idx += take;
  }
  return lines;
}

const quoteEl = document.getElementById('quote');
const quote = QUOTES[0];
const wc = quote.split(/\s+/).length;
const config = getConfig(wc);
const lines = breakIntoLines(quote, config.wpl);

lines.forEach(line => {
  const lineEl = document.createElement('div');
  lineEl.className = 'quote-line';
  lineEl.style.fontSize = config.size + 'vmin';
  lineEl.style.lineHeight = '1.3';
  lineEl.textContent = line;
  quoteEl.appendChild(lineEl);
});
</script>
</body>
</html>
