<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-weight: 900; }
  .container { width: 100vmin; height: 100vmin; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .container::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent, transparent 1px, rgba(0,0,0,0.12) 1px, rgba(0,0,0,0.12) 2px); pointer-events: none; z-index: 10; }
  .vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%); pointer-events: none; z-index: 9; }
  .stack { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .copy { position: absolute; text-align: center; text-transform: uppercase; letter-spacing: 0.05em; color: #F918D0; padding: 0 5vmin; line-height: 1.3; mix-blend-mode: screen; }
  .copy.degraded { filter: url(#xerox); }
  .streaks { position: absolute; inset: 0; pointer-events: none; z-index: 8; opacity: 0.4; mix-blend-mode: multiply; background-image: repeating-linear-gradient(to bottom, transparent 0 6px, rgba(0,0,0,0.18) 6px 7px); animation: streakShift 0.18s steps(3) infinite; }
  @keyframes streakShift { 0% { transform: translateY(0); } 33% { transform: translateY(-2px); } 66% { transform: translateY(3px); } 100% { transform: translateY(0); } }
</style></head><body>
<div class="container">
  <div class="vignette"></div>
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <filter id="xerox" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="2" result="grain">
          <animate attributeName="seed" values="2;6;11;17;23" dur="0.6s" repeatCount="indefinite"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="grain" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>
  <div class="stack" id="stack"></div>
  <div class="streaks"></div>
</div>
<script>
const QUOTES = ["Women have ruined the country and should not be allowed to vote."];
const LINES_CONFIG = { 4:{wpl:1,size:12}, 10:{wpl:3,size:6}, 15:{wpl:3,size:5}, 25:{wpl:3,size:4} };
function getConfig(wc) { if (wc<=4) return LINES_CONFIG[4]; if (wc<=10) return LINES_CONFIG[10]; if (wc<=18) return LINES_CONFIG[15]; return LINES_CONFIG[25]; }
function breakIntoLines(text, wpl) {
  const words = text.split(/\s+/);
  const totalLines = Math.ceil(words.length / wpl);
  const base = Math.floor(words.length / totalLines);
  const extra = words.length % totalLines;
  const lines = []; let idx = 0;
  for (let i = 0; i < totalLines; i++) { const take = base + (i < extra ? 1 : 0); lines.push(words.slice(idx, idx + take).join(' ')); idx += take; }
  return lines;
}
const quote = QUOTES[0].toUpperCase();
const wc = quote.split(/\s+/).length;
const config = getConfig(wc);
const lines = breakIntoLines(quote, config.wpl);
const stack = document.getElementById('stack');

function makeCopy(degraded) {
  const c = document.createElement('div');
  c.className = 'copy' + (degraded ? ' degraded' : '');
  c.style.fontSize = config.size + 'vmin';
  lines.forEach(l => { const d = document.createElement('div'); d.textContent = l; c.appendChild(d); });
  return c;
}

const N_COPIES = 5;
const copies = [];
for (let i = 0; i < N_COPIES; i++) {
  const c = makeCopy(i > 0);
  c.style.opacity = i === 0 ? '1' : String(0.85 - i * 0.18);
  c.style.transform = `translate(${(i*0.6).toFixed(1)}px, ${(i*0.4).toFixed(1)}px)`;
  stack.appendChild(c);
  copies.push(c);
}

let frame = 0;
function tick() {
  frame++;
  if (frame % 6 === 0) {
    copies.forEach((c, i) => {
      if (i === 0) return;
      const dx = (Math.random() - 0.5) * 6 * i;
      const dy = (Math.random() - 0.5) * 4 * i;
      c.style.transform = `translate(${dx.toFixed(1)}px, ${dy.toFixed(1)}px)`;
      const baseOp = 0.85 - i * 0.18;
      c.style.opacity = String(Math.max(0, baseOp + (Math.random() - 0.5) * 0.18));
    });
  }
  requestAnimationFrame(tick);
}
tick();
</script></body></html>
