<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-weight: 900;
  }
  .container {
    width: 100vmin; height: 100vmin;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .container::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      to bottom, transparent, transparent 1px,
      rgba(0,0,0,0.12) 1px, rgba(0,0,0,0.12) 2px
    );
    pointer-events: none; z-index: 10;
  }
  .hex-bg {
    position: absolute; inset: 0;
    font-family: 'Courier New', monospace;
    font-style: normal;
    font-weight: 400;
    font-size: 11px;
    line-height: 1.4;
    color: #F918D015;
    overflow: hidden;
    white-space: pre;
    padding: 12px 14px;
    z-index: 2;
    pointer-events: none;
  }
  #quote {
    position: relative;
    z-index: 6;
  }
  .quote-line {
    text-align: center;
    text-transform: uppercase;
    color: #F918D0;
    letter-spacing: 0.05em;
    min-height: 1.2em;
    padding: 0 5vmin;
  }
  .ch {
    display: inline-block;
    transition: color 0.05s linear;
  }
  .ch.corrupt {
    font-family: 'Courier New', monospace;
    font-style: normal;
    font-weight: 700;
    color: #ffffff;
  }
  .label {
    position: absolute; bottom: 30px;
    font-size: 10px; color: #F918D030;
    letter-spacing: 0.3em; text-transform: uppercase;
    z-index: 11;
  }
</style>
</head>
<body>
<div class="container">
  <pre class="hex-bg" id="hex"></pre>
  <div id="quote"></div>
</div>
<script>
const QUOTES = ["Women have ruined the country and should not be allowed to vote."];

const LINES_CONFIG = {
  4:  { wpl: 1, size: 12 },
  10: { wpl: 3, size: 6 },
  15: { wpl: 3, size: 5 },
  25: { wpl: 3, size: 4 },
};
function getConfig(wc) {
  if (wc <= 4)  return LINES_CONFIG[4];
  if (wc <= 10) return LINES_CONFIG[10];
  if (wc <= 18) return LINES_CONFIG[15];
  return LINES_CONFIG[25];
}
function breakIntoLines(text, wpl) {
  const words = text.split(/\s+/);
  const totalLines = Math.ceil(words.length / wpl);
  const base = Math.floor(words.length / totalLines);
  const extra = words.length % totalLines;
  const lines = []; let idx = 0;
  for (let i = 0; i < totalLines; i++) {
    const take = base + (i < extra ? 1 : 0);
    lines.push(words.slice(idx, idx + take).join(' '));
    idx += take;
  }
  return lines;
}

// --- Hex background: animated faux memory dump ---
function randHexByte() {
  return Math.floor(Math.random() * 256).toString(16).toUpperCase().padStart(2, '0');
}
function makeHexLine(addr) {
  const a = addr.toString(16).toUpperCase().padStart(8, '0');
  const bytes = Array.from({length: 16}, randHexByte).join(' ');
  return `${a}  ${bytes}`;
}
const hexEl = document.getElementById('hex');
let baseAddr = 0x4F2A0;
function refreshHex() {
  const rows = Math.ceil(window.innerHeight / 16);
  let txt = '';
  for (let i = 0; i < rows; i++) {
    txt += makeHexLine(baseAddr + i * 16) + '\n';
  }
  hexEl.textContent = txt;
}
refreshHex();
setInterval(() => {
  baseAddr += 16;
  refreshHex();
}, 220);

// --- Quote rendering with per-char corruption ---
const quoteEl = document.getElementById('quote');
const quote = QUOTES[0];
const wc = quote.split(/\s+/).length;
const config = getConfig(wc);
const lines = breakIntoLines(quote, config.wpl);

const allChars = [];
lines.forEach(line => {
  const lineEl = document.createElement('div');
  lineEl.className = 'quote-line';
  lineEl.style.fontSize = config.size + 'vmin';
  lineEl.style.lineHeight = '1.3';
  for (const c of line) {
    const span = document.createElement('span');
    span.className = 'ch';
    span.textContent = c;
    span.dataset.original = c;
    lineEl.appendChild(span);
    if (c !== ' ') allChars.push(span);
  }
  quoteEl.appendChild(lineEl);
});

// Length-aware damping: shorter quotes can take more corruption,
// long ones must stay legible.
const CORRUPT_RATE = wc <= 4 ? 0.18 : wc <= 10 ? 0.07 : 0.035;
const CORRUPT_INTERVAL = wc <= 4 ? 320 : wc <= 10 ? 500 : 720;

setInterval(() => {
  allChars.forEach(span => {
    if (span.classList.contains('corrupt')) {
      span.textContent = span.dataset.original;
      span.classList.remove('corrupt');
    }
  });
  const numCorrupt = Math.max(1, Math.floor(allChars.length * CORRUPT_RATE));
  for (let i = 0; i < numCorrupt; i++) {
    const span = allChars[Math.floor(Math.random() * allChars.length)];
    span.textContent = '0x' + randHexByte();
    span.classList.add('corrupt');
  }
}, CORRUPT_INTERVAL);
</script>
</body>
</html>
