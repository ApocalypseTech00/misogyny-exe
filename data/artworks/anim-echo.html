<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-weight: 900; }
  .container { width: 100vmin; height: 100vmin; position: relative; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .container::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent, transparent 1px, rgba(0,0,0,0.12) 1px, rgba(0,0,0,0.12) 2px); pointer-events: none; z-index: 10; }
  .quote-line { text-align: center; text-transform: uppercase; color: #F918D0; letter-spacing: 0.05em; min-height: 1.2em; padding: 0 5vmin; position: relative; }
  .word-wrap { position: relative; display: inline-block; margin: 0 0.25em; }
  .word { display: inline-block; opacity: 0; transform: translateX(-30px); transition: opacity 0.35s ease-out, transform 0.35s ease-out; }
  .word.appeared { opacity: 1; transform: translateX(0); }
  .echo-trail { position: absolute; left: 0; top: 0; pointer-events: none; }
  .echo-trail span {
    position: absolute; left: 0; top: 0;
    color: #F918D0; opacity: 0;
    animation: echoFade 0.9s ease-out forwards;
  }
  @keyframes echoFade {
    0%   { opacity: 0.7; transform: translateX(-26px) scale(1); filter: blur(0.5px); }
    100% { opacity: 0; transform: translateX(0) scale(1); filter: blur(2px); }
  }
  .label { position: absolute; bottom: 30px; font-size: 10px; color: #F918D030; letter-spacing: 0.3em; text-transform: uppercase; z-index: 11; }
</style></head><body>
<div class="container">
  <div id="quote"></div>
</div>
<script>
const QUOTES = ["Women have ruined the country and should not be allowed to vote."];
const LINES_CONFIG = { 4:{wpl:1,size:12}, 10:{wpl:3,size:6}, 15:{wpl:3,size:5}, 25:{wpl:3,size:4} };
function getConfig(wc) { if (wc<=4) return LINES_CONFIG[4]; if (wc<=10) return LINES_CONFIG[10]; if (wc<=18) return LINES_CONFIG[15]; return LINES_CONFIG[25]; }
function breakIntoLines(text, wpl) {
  const words = text.split(/\s+/);
  const totalLines = Math.ceil(words.length / wpl);
  const base = Math.floor(words.length / totalLines);
  const extra = words.length % totalLines;
  const lines = []; let idx = 0;
  for (let i = 0; i < totalLines; i++) { const take = base + (i < extra ? 1 : 0); lines.push(words.slice(idx, idx + take).join(' ')); idx += take; }
  return lines;
}

function render() {
  const quoteEl = document.getElementById('quote');
  quoteEl.innerHTML = '';
  const quote = QUOTES[0];
  const wc = quote.split(/\s+/).length;
  const config = getConfig(wc);
  const lines = breakIntoLines(quote, config.wpl);

  const allWraps = [];
  lines.forEach(line => {
    const lineEl = document.createElement('div');
    lineEl.className = 'quote-line';
    lineEl.style.fontSize = config.size + 'vmin';
    lineEl.style.lineHeight = '1.3';
    line.split(/\s+/).forEach(w => {
      const wrap = document.createElement('span');
      wrap.className = 'word-wrap';
      const trail = document.createElement('span');
      trail.className = 'echo-trail';
      const word = document.createElement('span');
      word.className = 'word';
      word.textContent = w;
      wrap.appendChild(trail);
      wrap.appendChild(word);
      lineEl.appendChild(wrap);
      allWraps.push({ wrap, trail, word, text: w });
    });
    quoteEl.appendChild(lineEl);
  });

  // Reveal words sequentially with echo trails
  allWraps.forEach((obj, i) => {
    setTimeout(() => {
      // Echo copies
      for (let k = 0; k < 3; k++) {
        const ghost = document.createElement('span');
        ghost.textContent = obj.text;
        ghost.style.animationDelay = (k * 90) + 'ms';
        obj.trail.appendChild(ghost);
        setTimeout(() => ghost.remove(), 1500);
      }
      obj.word.classList.add('appeared');
    }, 250 + i * 220);
  });
  const totalMs = 250 + allWraps.length * 220 + 3500;
  setTimeout(render, totalMs);
}
render();
</script></body></html>
