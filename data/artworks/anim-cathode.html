<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-weight: 900; }
  .container { width: 100vmin; height: 100vmin; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .container::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent, transparent 1px, rgba(0,0,0,0.12) 1px, rgba(0,0,0,0.12) 2px); pointer-events: none; z-index: 10; }

  .crt { position: relative; z-index: 5; transform-origin: center center; will-change: transform, filter, opacity; animation: powerCycle 5s ease-in-out infinite; }
  .quote { text-align: center; text-transform: uppercase; letter-spacing: 0.05em; color: #F918D0; padding: 0 5vmin; line-height: 1.3; max-width: 96vmin; }

  .flash { position: absolute; left: 50%; top: 50%; width: 100%; height: 2px; background: #ffffff; box-shadow: 0 0 18px #ffffffcc, 0 0 40px #F918D0aa; transform: translate(-50%, -50%) scaleX(0); opacity: 0; z-index: 6; }
  .dot { position: absolute; left: 50%; top: 50%; width: 6px; height: 6px; background: #ffffff; border-radius: 50%; box-shadow: 0 0 14px #ffffffcc, 0 0 30px #F918D0aa; transform: translate(-50%, -50%) scale(0); opacity: 0; z-index: 7; }

  @keyframes powerCycle {
    0%   { transform: scaleX(1) scaleY(1); filter: brightness(1); opacity: 1; }
    25%  { transform: scaleX(1.02) scaleY(1); filter: brightness(1); opacity: 1; }
    32%  { transform: scaleX(1.1) scaleY(0.02); filter: brightness(2.5); opacity: 1; }
    34%  { transform: scaleX(1.1) scaleY(0); filter: brightness(2.5); opacity: 0; }
    66%  { transform: scaleX(1.1) scaleY(0); opacity: 0; }
    68%  { transform: scaleX(1.1) scaleY(0.02); filter: brightness(2.5); opacity: 1; }
    75%  { transform: scaleX(1.02) scaleY(1); filter: brightness(1); opacity: 1; }
    100% { transform: scaleX(1) scaleY(1); filter: brightness(1); opacity: 1; }
  }

  @keyframes flashLine {
    0%, 30%   { transform: translate(-50%, -50%) scaleX(0); opacity: 0; }
    32%       { transform: translate(-50%, -50%) scaleX(1); opacity: 1; }
    40%       { transform: translate(-50%, -50%) scaleX(0.6); opacity: 1; }
    50%       { transform: translate(-50%, -50%) scaleX(0.2); opacity: 0.8; }
    60%, 100% { transform: translate(-50%, -50%) scaleX(0); opacity: 0; }
  }
  .flash { animation: flashLine 5s ease-in-out infinite; }

  @keyframes flashDot {
    0%, 50%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    55%       { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    62%       { transform: translate(-50%, -50%) scale(0.4); opacity: 0.6; }
    66%, 100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  }
  .dot { animation: flashDot 5s ease-in-out infinite; }
</style></head><body>
<div class="container">
  <div class="crt"><div class="quote" id="q"></div></div>
  <div class="flash"></div>
  <div class="dot"></div>
</div>
<script>
const QUOTES = ["Women have ruined the country and should not be allowed to vote."];
const LINES_CONFIG = { 4:{wpl:1,size:12}, 10:{wpl:3,size:6}, 15:{wpl:3,size:5}, 25:{wpl:3,size:4} };
function getConfig(wc) { if (wc<=4) return LINES_CONFIG[4]; if (wc<=10) return LINES_CONFIG[10]; if (wc<=18) return LINES_CONFIG[15]; return LINES_CONFIG[25]; }
function breakIntoLines(text, wpl) {
  const words = text.split(/\s+/);
  const totalLines = Math.ceil(words.length / wpl);
  const base = Math.floor(words.length / totalLines);
  const extra = words.length % totalLines;
  const lines = []; let idx = 0;
  for (let i = 0; i < totalLines; i++) { const take = base + (i < extra ? 1 : 0); lines.push(words.slice(idx, idx + take).join(' ')); idx += take; }
  return lines;
}
const quote = QUOTES[0].toUpperCase();
const wc = quote.split(/\s+/).length;
const config = getConfig(wc);
const lines = breakIntoLines(quote, config.wpl);
const q = document.getElementById('q');
q.style.fontSize = config.size + 'vmin';
lines.forEach(l => { const d = document.createElement('div'); d.textContent = l; q.appendChild(d); });
</script></body></html>
